# Docker Compose 覆盖示例
# 复制为 docker-compose.override.yml 并自定义

version: "3.8"

services:
  symphony:
    # 挂载您的源代码供 Agent 处理
    volumes:
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      - ./workspaces:/app/workspaces
      - ./logs:/app/logs
      # 挂载您的项目供 Agent 编辑
      - ../my-project:/src:rw
    
    environment:
      # 覆盖特定设置
      - SYMPHONY_MAX_CONCURRENT=5
      - SYMPHONY_LOG_LEVEL=DEBUG
    
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # 添加监控（可选）
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    profiles:
      - monitoring
