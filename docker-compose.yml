# Symphony - Docker Compose Configuration
# Quick start: docker-compose up -d

version: "3.8"

services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: symphony
    restart: unless-stopped
    
    environment:
      # LLM Provider Configuration
      # Uncomment and configure your preferred provider:
      
      # OpenAI (Default)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      
      # Anthropic
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      
      # DeepSeek
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      
      # Gemini
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - GEMINI_MODEL=${GEMINI_MODEL:-gemini-pro}
      
      # Linear Configuration
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - LINEAR_PROJECT_SLUG=${LINEAR_PROJECT_SLUG:-}
      
      # Symphony Settings
      - SYMPHONY_WORKSPACE_ROOT=/app/workspaces
      - SYMPHONY_LOG_LEVEL=${SYMPHONY_LOG_LEVEL:-INFO}
      - SYMPHONY_MAX_CONCURRENT=${SYMPHONY_MAX_CONCURRENT:-3}
    
    volumes:
      # Mount workflow configuration
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      
      # Mount workspaces for persistence
      - symphony-workspaces:/app/workspaces
      
      # Mount logs
      - ./logs:/app/logs
      
      # Optional: Mount SSH keys for git operations
      # - ~/.ssh:/home/symphony/.ssh:ro
      
      # Optional: Mount custom prompts
      # - ./prompts:/app/prompts:ro
    
    ports:
      - "${SYMPHONY_PORT:-8000}:8000"
    
    command: ["/app/WORKFLOW.md", "--port", "8000"]
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: Redis for caching and state management
  redis:
    image: redis:7-alpine
    container_name: symphony-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    # Uncomment to expose Redis externally
    # ports:
    #   - "6379:6379"

  # Optional: Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: symphony-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    command: --interval 3600 symphony
    profiles:
      - auto-update

volumes:
  symphony-workspaces:
  redis-data:
