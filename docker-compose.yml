# Symphony - Docker Compose 配置
# 快速启动: docker-compose up -d

version: "3.8"

services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: symphony
    restart: unless-stopped
    
    environment:
      # LLM 供应商配置
      # 取消注释并配置您首选的供应商：
      
      # OpenAI (默认)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      
      # Anthropic
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      
      # DeepSeek
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      
      # Gemini
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - GEMINI_MODEL=${GEMINI_MODEL:-gemini-pro}
      
      # Linear 配置
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - LINEAR_PROJECT_SLUG=${LINEAR_PROJECT_SLUG:-}
      
      # Symphony 设置
      - SYMPHONY_WORKSPACE_ROOT=/app/workspaces
      - SYMPHONY_LOG_LEVEL=${SYMPHONY_LOG_LEVEL:-INFO}
      - SYMPHONY_MAX_CONCURRENT=${SYMPHONY_MAX_CONCURRENT:-3}
    
    volumes:
      # 挂载工作流配置
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      
      # 挂载工作空间以持久化
      - symphony-workspaces:/app/workspaces
      
      # 挂载日志
      - ./logs:/app/logs
      
      # 可选: 挂载 SSH 密钥用于 git 操作
      # - ~/.ssh:/home/symphony/.ssh:ro
      
      # 可选: 挂载自定义提示词
      # - ./prompts:/app/prompts:ro
    
    ports:
      - "${SYMPHONY_PORT:-8000}:8000"
    
    command: ["/app/WORKFLOW.md", "--port", "8000"]
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # 可选: Redis 用于缓存和状态管理
  redis:
    image: redis:7-alpine
    container_name: symphony-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    # 取消注释以对外暴露 Redis
    # ports:
    #   - "6379:6379"

  # 可选: Watchtower 用于自动更新
  watchtower:
    image: containrrr/watchtower
    container_name: symphony-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    command: --interval 3600 symphony
    profiles:
      - auto-update

volumes:
  symphony-workspaces:
  redis-data:
